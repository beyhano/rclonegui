name: "Publish Release"

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "ubuntu-22.04"
            args: ""
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Node.js kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: pnpm kurulumu
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev xdg-utils

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Sanitize signing key
        shell: bash
        env:
          RAW_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          CLEAN_KEY=$(printf '%s' "$RAW_KEY" | tr -d '\r')
          CLEAN_KEY="${CLEAN_KEY%${CLEAN_KEY##*[![:space:]]}}"
          echo "TAURI_SIGNING_PRIVATE_KEY<<EOF" >> $GITHUB_ENV
          printf '%s\n' "$CLEAN_KEY" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Build and Publish
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "rclonegui v__VERSION__"
          releaseBody: "rclonegui v__VERSION__"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
