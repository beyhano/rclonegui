name: 'rclonegui-release'

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
          - platform: 'windows-latest'

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Node.js kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: pnpm kurulumu
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Rust kurulumu
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Linux bagimliliklari
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf libssl-dev libgtk-3-dev libfuse2

      - name: Frontend bagimliliklari
        run: pnpm install --frozen-lockfile

      - name: Tauri build + release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: 'rcloneguikey'
        with:
          tagName: v__VERSION__
          releaseName: 'rclonegui v__VERSION__'
          releaseBody: 'Detayli degisiklik listesi icin CHANGELOG.md dosyasina bakin.'
          releaseDraft: true
          prerelease: false